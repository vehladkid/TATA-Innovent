<svg width="48" height="48" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="shape-rendering:geometricPrecision">
  <defs>
    <!-- Soft shadow for depth -->
    <filter id="logo-depth-shadow" x="-30%" y="-20%" width="160%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" floodColor="#000000" floodOpacity="0.85" />
    </filter>

    <filter id="inner-bevel-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset dx="0" dy="1" />
      <feGaussianBlur stdDeviation="0.8" result="offset-blur" />
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse" />
      <feFlood floodColor="black" floodOpacity="0.7" result="color" />
      <feComposite operator="in" in="color" in2="inverse" result="shadow" />
      <feComposite operator="over" in="shadow" in2="SourceGraphic" />
    </filter>

    <!-- Metal reflections and clean gray scales -->
    <linearGradient id="brushed-silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#D4D4D8" />
      <stop offset="100%" stop-color="#8E8E93" />
    </linearGradient>

    <linearGradient id="matte-graphite" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E2E33" />
      <stop offset="60%" stop-color="#1B1B1E" />
      <stop offset="100%" stop-color="#0B0B0C" />
    </linearGradient>

    <linearGradient id="silver-polished-edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85" />
      <stop offset="50%" stop-color="#D4D4D8" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.7" />
    </linearGradient>
  </defs>

  <g filter="url(#logo-depth-shadow)" opacity="1">
    <!-- 1. Left Panel (Outer V-Bracket) -->
    <path d="M 14 22 L 22 22 L 50 68.2 L 78 22 L 86 22 L 50 81.4 Z" fill="url(#brushed-silver)" stroke="url(#silver-polished-edge)" stroke-width="0.8" />

    <!-- 2. Right Panel (Inner Wedge) -->
    <path d="M 30 22 L 70 22 L 50 55 Z" fill="url(#matte-graphite)" filter="url(#inner-bevel-shadow)" />

    <!-- 3. Trajectory Centerline (Cyan #00C8FF) -->
    <path d="M 26 22 L 50 61.6 L 74 22" fill="none" stroke="#00C8FF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" />
  </g>
</svg>